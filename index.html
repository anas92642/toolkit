
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAS TOOLKIT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:#00ff41;
text-align:center;
overflow-x:hidden;
cursor:crosshair;
}

/* container */
.container{
margin-top:60px;
}

/* buttons */
.btn{
display:block;
margin:12px auto;
padding:14px;
width:90%;
max-width:420px;
border:2px solid #00ff41;
background:transparent;
color:#00ff41;
font-weight:bold;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

.btn:hover{
background:#00ff41;
color:black;
transform:scale(1.05);
}

/* title */
.title{
font-size:40px;
text-shadow:0 0 20px #00ff41;
margin-bottom:20px;
}

/* terminal */
.terminal{
font-family:monospace;
margin-bottom:20px;
}

/* progress bar */
.progress{
width:80%;
height:10px;
border:1px solid #00ff41;
margin:20px auto;
}

.bar{
height:100%;
width:0%;
background:#00ff41;
animation:load 6s linear infinite;
}

@keyframes load{
0%{width:0}
100%{width:100%}
}

/* clock */
#clock{
margin-bottom:20px;
font-family:monospace;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<div class="terminal" id="typing"></div>

<div class="progress"><div class="bar"></div></div>

<div id="clock"></div>

<h1 class="title">ANAS TOOLKIT</h1>

<a href="https://whatsapp.com/channel/0029VbBhvirF1YlbC7JAN03p" class="btn" target="_blank">JOIN WHATSAPP CHANNEL</a>

<a href="https://h2-hacker-database-2.vercel.app/" class="btn">SIM DATABASE</a>
<a href="https://website-to-apk.vercel.app/" class="btn">WEBSITE TO APK</a>
<a href="https://ai-logo-delta.vercel.app" class="btn">AI LOGO GENERATOR</a>
<a href="https://ip-info-tool-seven.vercel.app/" class="btn">IP INFO TOOL</a>

</div>

<script>

/* typing effect */
const text="ACCESSING ANAS TOOLKIT SYSTEM...";
let i=0;
function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);
}
}
typing();

/* clock */
function updateClock(){
const now=new Date();
document.getElementById("clock").innerHTML="SERVER TIME : "+now.toLocaleTimeString();
}
setInterval(updateClock,1000);

/* matrix rain */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

const letters="01ANAS";
const matrix=letters.split("");

const font_size=14;
const columns=canvas.width/font_size;

const drops=[];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff41";
ctx.font=font_size+"px monospace";

for(let i=0;i<drops.length;i++){
const text=matrix[Math.floor(Math.random()*matrix.length)];
ctx.fillText(text,i*font_size,drops[i]*font_size);

if(drops[i]*font_size>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,35);

</script>

</body>
</html>
